<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="msvalidate.01" content="00F65834AB5653D3466CED1E8386FDB7" />
		<!-- Google tag (gtag.js) -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-FTDXNZN78T"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('js', new Date());
			gtag('config', 'G-FTDXNZN78T');
		gtag('config', 'AW-17970075651');
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	<script>
		// Load Ivory AI chatbot
		// Note: the widget has a bug where var t (themes) overwrites function t (i18n).
		// Loading via fetch + patching to fix the variable collision.
		setTimeout(function() {
			if (document.getElementById('ivory-widget')) return;
			fetch('https://ivoryai.net/widget/ivory.js')
				.then(function(r) { return r.text(); })
				.then(function(code) {
					// Fix: rename themes var from 't' to 'themeConfig' to avoid overwriting i18n t()
					var fixed = code.replace('var t = themes[theme] || themes.general;', 'var themeConfig = themes[theme] || themes.general;');
					// Update all references to the theme variable (t.bg, t.bgHover, t.icon)
					fixed = fixed.replace(/\bt\.bg\b/g, 'themeConfig.bg');
					fixed = fixed.replace(/\bt\.bgHover\b/g, 'themeConfig.bgHover');
					fixed = fixed.replace(/\bt\.icon\b/g, 'themeConfig.icon');
					var s = document.createElement('script');
					s.setAttribute('data-practice-id', '52');
					s.textContent = fixed;
					document.body.appendChild(s);
				});
		}, 1500);
	</script>
	<script>
		// Track WhatsApp clicks as Google Ads conversions
		document.addEventListener('click', function(e) {
			var link = e.target.closest('a[href*="wa.me"]');
			if (link) {
				gtag('event', 'ads_conversion_Contact_Us_1', {
					'event_callback': function() {},
					'event_timeout': 2000
				});
				gtag('event', 'whatsapp_click', {
					'event_category': 'conversion',
					'event_label': link.href
				});
			}
		});
	</script>
	</body>
</html>
