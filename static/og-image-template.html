<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Decorative elements */
    .glow-1 {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
      border-radius: 50%;
    }
    .glow-2 {
      position: absolute;
      bottom: -150px;
      left: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(239, 68, 68, 0.2) 0%, transparent 70%);
      border-radius: 50%;
    }
    .content {
      text-align: center;
      z-index: 1;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
    }
    .line {
      width: 60px;
      height: 3px;
      background: rgba(255,255,255,0.8);
    }
    .logo-text h1 {
      font-size: 72px;
      font-weight: 900;
      color: white;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1;
    }
    .logo-text p {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .tagline {
      font-size: 28px;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
    }
    .tagline span {
      color: #3b82f6;
      font-weight: 600;
    }
    .url {
      position: absolute;
      bottom: 40px;
      font-size: 18px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="content">
    <div class="logo">
      <div class="line"></div>
      <div class="logo-text">
        <h1>Onur Haniffa</h1>
        <p>Est. 2025</p>
      </div>
      <div class="line"></div>
    </div>
    <p class="tagline">Web Designer & Developer — <span>Websites that convert</span></p>
  </div>

  <p class="url">onurhaniffa.com</p>
</body>
</html>
